<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTD Course Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">☄️ UTD Degree Path Engine</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">
                        <h4 class="card-title mb-3 fw-bold text-dark">Parameters</h4>
                        <form id="plannerForm">
                            <div class="mb-3">
                                <label for="completedInput" class="form-label fw-semibold text-secondary">Completed Courses</label>
                                <input type="text" class="form-control form-control-lg" id="completedInput" placeholder="e.g., CS1436, CS2305">
                                <div class="form-text text-muted">Separate multiple classes using commas.</div>
                            </div>
                            <div class="mb-4">
                                <label for="creditInput" class="form-label fw-semibold text-secondary">Max Credits / Semester</label>
                                <input type="number" class="form-control form-control-lg" id="creditInput" value="15" min="3" max="19">
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Generate Roadmap</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">
                        <h4 class="card-title mb-4 fw-bold text-dark">Generated Graduation Plan</h4>
                        <div id="outputContainer">
                            <div class="text-center py-5 text-muted">
                                <p class="lead mb-0">Set your variables and run the generator to trace optimal course flow.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
